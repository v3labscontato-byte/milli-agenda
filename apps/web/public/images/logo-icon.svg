<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- Fundo azul com cantos arredondados -->
  <rect width="400" height="400" rx="88" ry="88" fill="#1F57FF"/>

  <!-- Pessoa esquerda: branca -->
  <circle cx="130" cy="108" r="40" fill="white"/>
  <rect x="92" y="160" width="76" height="172" rx="38" fill="white"/>

  <!-- Pessoa direita: laranja -->
  <circle cx="258" cy="108" r="40" fill="#FF6A00"/>
  <rect x="220" y="160" width="76" height="172" rx="38" fill="#FF6A00"/>

  <!-- Bolinhas do acordo — pequenas, centralizadas entre os corpos, sem encostar -->
  <circle cx="181" cy="236" r="13" fill="white"/>
  <circle cx="209" cy="236" r="13" fill="#FF6A00"/>

</svg>
